<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ book.title }} | The Book Vault 📖</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        📖 The Book Vault
    </div>

    <ul>

        <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>

        <li><a href="{{ url_for('search') }}">Search</a></li>

        <li><a href="{{ url_for('wishlist') }}">Wishlist</a></li>

        <li><a href="{{ url_for('profile') }}">Profile</a></li>

        <li><a href="{{ url_for('home') }}">Logout</a></li>

    </ul>

</nav>

<section class="book-details">

    <div class="book-image">

        <img src="{{ book.image }}"
             alt="{{ book.title }}">

    </div>

    <div class="book-info">

        <h1>{{ book.title }}</h1>

        <h3>Author</h3>

        <p>{{ book.author }}</p>

        <h3>Genre</h3>

        <p>{{ book.genre }}</p>

        <h3>Description</h3>

        <p>{{ book.description }}</p>

        <div class="book-buttons">

            <button class="btn"
onclick="window.location.href='{{ url_for('add_wishlist', book_id=book.id) }}'">

    ❤️ Add to Wishlist

</button>

<button class="btn"
onclick="window.location.href='{{ url_for('recommendation', book_title=book.title) }}'">

    🤖 Recommend Similar Books

</button>

        </div>

    </div>

</section>

<footer>

    © 2026 The Book Vault 📖

</footer>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
